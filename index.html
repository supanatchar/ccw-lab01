<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@100..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./01styles.css">
    <title>Lab01 : Post UI</title>
</head>
<body>
    <h1>Lab01 : Post UI</h1>
    <hr>
    <div class="post-box">
        <div class="top">
            <img src="./pics/avatar_bad.svg" alt="avatar" width="40px;">
                <input type="text" class="text" placeholder="&nbsp;&nbsp;What do you think?">
        </div>
        <hr>
        <div class="bottom">
            <div class="item live"><i class="fa-solid fa-video"></i><a href="#">Live !</a></div>
            <div class="item pic"><i class="fa-regular fa-images"></i><a href="#">Pic/video</a></div>
            <div class="item clip"><i class="fa-solid fa-film"></i><a href="#">Clip</a></div>
        </div>
    </div>
</body>
</html>
